<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Wishes Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Birthday wishes board">
      <h1>🎉 Happy Birthday!</h1>

      <section id="board" class="board" aria-live="polite"></section>

      <form id="wishForm" class="wish-form">
        <label>
          <span class="sr-only">Your name</span>
          <input id="name" type="text" placeholder="Your name" maxlength="40" />
        </label>
        <label class="wish-input">
          <span class="sr-only">Write a wish</span>
          <input
            id="text"
            type="text"
            placeholder="Write a wish..."
            maxlength="200"
            required
          />
        </label>
        <button type="submit">Add 🎈</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
